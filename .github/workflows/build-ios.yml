name: Build and upload iOS app
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Write Apple API Key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$APPLE_P8" > ~/.private_keys/AuthKey_${KEY_ID}.p8
        env:
          APPLE_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Generate Xcode project
        run: npx expo prebuild --platform ios --clean --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Build and upload to App Store
        run: fastlane ios release
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_KEY_PATH: ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
